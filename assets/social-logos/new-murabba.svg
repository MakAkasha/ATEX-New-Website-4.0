  <text x="200" y="186" text-anchor="middle" font-family="Arial, sans-serif" font-size="42" font-weight="800" fill="#2e4b8f">NEW</text>
  <text x="200" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="42" font-weight="800" fill="#2e4b8f">MURABBA</text>
